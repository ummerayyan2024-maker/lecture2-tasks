<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SERPENT // Advanced Snake</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #00ff88;
    --accent2: #00cc6a;
    --accent-dim: rgba(0,255,136,0.12);
    --danger: #ff4466;
    --warn: #ffaa00;
    --text: #e0e0f0;
    --text-dim: #666680;
    --snake-head: #00ff88;
    --snake-body: #00cc6a;
    --snake-tail: #007744;
    --food: #ff4466;
    --food-glow: rgba(255,68,102,0.6);
    --radius: 4px;
    --font-mono: 'Courier New', Courier, monospace;
  }

  body.light {
    --bg: #f0f0f8;
    --surface: #ffffff;
    --surface2: #e8e8f2;
    --border: #ccccdd;
    --text: #111122;
    --text-dim: #888899;
    --accent-dim: rgba(0,180,80,0.1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    user-select: none;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Header ── */
  #header {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 6px;
    flex-shrink: 0;
  }

  #logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 12px var(--accent);
  }

  .hdr-controls { display: flex; gap: 8px; align-items: center; }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--border); }
  .icon-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ── Scoreboard ── */
  #scoreboard {
    width: 100%;
    max-width: 520px;
    display: flex;
    gap: 6px;
    padding: 0 14px 8px;
    flex-shrink: 0;
  }

  .stat-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 8px;
    text-align: center;
  }
  .stat-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); display: block; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1.1; }
  #stat-time.danger .stat-val { color: var(--danger); animation: blink 0.5s step-end infinite; }

  @keyframes blink { 50% { opacity: 0.3; } }

  /* ── Canvas Wrapper ── */
  #canvas-wrap {
    position: relative;
    flex-shrink: 0;
  }

  #game-canvas {
    display: block;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    image-rendering: pixelated;
  }

  /* ── Overlays ── */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    border-radius: var(--radius);
    backdrop-filter: blur(4px);
  }
  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
  }

  .overlay-score {
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }
  .overlay-score span { color: var(--accent); font-size: 20px; }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 22px;
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 3px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    width: 160px;
    text-align: center;
  }
  .btn:hover { background: var(--accent-dim); }
  .btn.primary { background: var(--accent); color: var(--bg); font-weight: 700; }
  .btn.primary:hover { background: var(--accent2); }

  /* ── Menu ── */
  #menu-screen {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 20px;
  }
  #menu-screen.hidden { display: none; }

  .menu-title {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
  }
  .menu-sub {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    align-self: flex-start;
    margin-bottom: -10px;
  }

  .toggle-group {
    display: flex;
    gap: 6px;
    width: 100%;
    max-width: 280px;
  }

  .toggle-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .toggle-btn.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .menu-hint {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ── D-Pad ── */
  #dpad {
    display: none;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .dpad-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active, .dpad-btn.pressed { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .dpad-center {
    background: var(--surface);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .dpad-empty { background: transparent; border: none; pointer-events: none; }

  /* ── Footer stats ── */
  #footer {
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: space-between;
    padding: 6px 14px 8px;
    flex-shrink: 0;
  }
  .foot-stat { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); }
  .foot-stat span { color: var(--text); }

  /* ── Achievement toast ── */
  #achievement {
    position: fixed;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
    box-shadow: 0 4px 20px rgba(0,255,136,0.3);
    transition: top 0.4s ease;
    z-index: 100;
    white-space: nowrap;
  }
  #achievement.show { top: 12px; }

  /* ── Responsive ── */
  @media (pointer: coarse) {
    #dpad { display: grid; }
  }

  @media (max-height: 700px) {
    #header { padding: 6px 14px 4px; }
    #scoreboard { padding: 0 14px 4px; }
    .stat-val { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Achievement Toast -->
<div id="achievement">🏆 <span id="achievement-text">ACHIEVEMENT UNLOCKED</span></div>

<!-- Header -->
<div id="header">
  <div id="logo">SERPENT</div>
  <div class="hdr-controls">
    <button class="icon-btn active" id="btn-sound" title="Sound">🔊</button>
    <button class="icon-btn" id="btn-theme" title="Toggle theme">🌙</button>
    <button class="icon-btn" id="btn-fs" title="Fullscreen">⛶</button>
  </div>
</div>

<!-- Scoreboard -->
<div id="scoreboard">
  <div class="stat-box">
    <span class="stat-label">SCORE</span>
    <div class="stat-val" id="score-display">0</div>
  </div>
  <div class="stat-box">
    <span class="stat-label">BEST</span>
    <div class="stat-val" id="best-display">0</div>
  </div>
  <div class="stat-box" id="stat-time">
    <span class="stat-label">TIME</span>
    <div class="stat-val" id="time-display">60</div>
  </div>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
  <canvas id="game-canvas"></canvas>

  <!-- Menu Screen -->
  <div id="menu-screen">
    <div class="menu-title">SERPENT</div>
    <div class="menu-sub">SELECT MODE &amp; DIFFICULTY</div>

    <div class="section-label">GAME MODE</div>
    <div class="toggle-group" id="mode-group">
      <button class="toggle-btn selected" data-val="classic">CLASSIC</button>
      <button class="toggle-btn" data-val="time">TIME ATTACK</button>
      <button class="toggle-btn" data-val="survival">SURVIVAL</button>
    </div>

    <div class="section-label">DIFFICULTY</div>
    <div class="toggle-group" id="diff-group">
      <button class="toggle-btn" data-val="easy">EASY</button>
      <button class="toggle-btn selected" data-val="medium">MEDIUM</button>
      <button class="toggle-btn" data-val="hard">HARD</button>
    </div>

    <button class="btn primary" id="btn-start">▶ START GAME</button>
    <div class="menu-hint">Arrow keys · WASD · D-pad boxes · Swipe</div>
  </div>

  <!-- Pause Overlay -->
  <div class="overlay hidden" id="pause-overlay">
    <div class="overlay-title">PAUSED</div>
    <button class="btn primary" id="btn-resume">▶ RESUME</button>
    <button class="btn" id="btn-pause-menu">MAIN MENU</button>
  </div>

  <!-- Game Over Overlay -->
  <div class="overlay hidden" id="gameover-overlay">
    <div class="overlay-title">GAME OVER</div>
    <div class="overlay-score">SCORE: <span id="go-score">0</span></div>
    <button class="btn primary" id="btn-replay">↺ PLAY AGAIN</button>
    <button class="btn" id="btn-go-menu">MAIN MENU</button>
  </div>
</div>

<!-- D-Pad -->
<div id="dpad">
  <div class="dpad-empty"></div>
  <button class="dpad-btn" id="dp-up">▲</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" id="dp-left">◀</button>
  <button class="dpad-btn dpad-center" id="dp-pause">⏸</button>
  <button class="dpad-btn" id="dp-right">▶</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" id="dp-down">▼</button>
  <div class="dpad-empty"></div>
</div>

<!-- Footer -->
<div id="footer">
  <div class="foot-stat">GAMES <span id="stat-games">0</span></div>
  <div class="foot-stat">CONTROLS WASD / ARROWS &nbsp; CENTER = PAUSE</div>
  <div class="foot-stat">FOOD <span id="stat-food">0</span></div>
  <div class="foot-stat">BEST EVER <span id="stat-bestever">0</span></div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────
const GRID = 20;
const SPEEDS = { easy: 130, medium: 85, hard: 50 };
const TIME_LIMIT = 60;

// ── Safe CSS Variable Getter ─────────────────────────────
function getCSSVar(varName) {
  const value = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  return value || '#2a2a3d'; // Fallback to default border color
}

// ── State ──────────────────────────────────────────────────
let canvas, ctx, W, H, COLS, ROWS;
let snake, dir, nextDir, food, score, timeLeft, gameMode, difficulty;
let gameLoop, timerLoop, running, paused;
let soundOn = true, lightMode = false;
let stats = { games: 0, food: 0, best: 0 };
let swipeStart = null;

// Load persisted stats
try {
  const s = JSON.parse(localStorage.getItem('serpent-stats') || '{}');
  if (s.games) stats.games = s.games;
  if (s.food)  stats.food  = s.food;
  if (s.best)  stats.best  = s.best;
} catch(e) {}

function saveStats() {
  try { localStorage.setItem('serpent-stats', JSON.stringify(stats)); } catch(e) {}
}

// ── Audio (Web Audio API) ──────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBeep(freq, dur, type='square', vol=0.15) {
  if (!soundOn) return;
  try {
    const ctx2 = getAudio();
    const osc = ctx2.createOscillator();
    const gain = ctx2.createGain();
    osc.connect(gain); gain.connect(ctx2.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx2.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + dur);
    osc.start(); osc.stop(ctx2.currentTime + dur);
  } catch(e) {}
}

function sfxEat()  { playBeep(440, 0.08, 'square', 0.18); setTimeout(()=>playBeep(660, 0.06, 'square', 0.12), 50); }
function sfxDie()  { playBeep(200, 0.3, 'sawtooth', 0.2); setTimeout(()=>playBeep(100, 0.4, 'sawtooth', 0.15), 150); }
function sfxPause(){ playBeep(330, 0.1, 'sine', 0.1); }

// ── Setup Canvas ───────────────────────────────────────────
function setupCanvas() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');

  const wrap = document.getElementById('canvas-wrap');
  const headerH = document.getElementById('header').offsetHeight;
  const scoreH  = document.getElementById('scoreboard').offsetHeight;
  const dpadH   = document.getElementById('dpad').offsetHeight || 0;
  const footH   = document.getElementById('footer').offsetHeight;
  const padding = 14 * 2;

  const availW = Math.min(window.innerWidth - padding, 520 - padding);
  const availH = window.innerHeight - headerH - scoreH - footH - (dpadH ? dpadH + 8 : 0) - 30;

  // Snap to grid
  COLS = Math.floor(Math.min(availW, availH) / GRID);
  ROWS = COLS;
  W = COLS * GRID;
  H = ROWS * GRID;

  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}

// ── Game Init ──────────────────────────────────────────────
function initGame(mode, diff) {
  gameMode   = mode;
  difficulty = diff;
  score      = 0;
  timeLeft   = TIME_LIMIT;
  running    = true;
  paused     = false;

  // Start snake in center, 3 segments, moving right
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX, y: midY },
    { x: midX - 1, y: midY },
    { x: midX - 2, y: midY },
  ];
  dir      = { x: 1, y: 0 };
  nextDir  = { x: 1, y: 0 };
  food     = spawnFood();

  updateHUD();
  updateStatTime();

  // Hide menu / overlays
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');

  clearInterval(gameLoop);
  clearInterval(timerLoop);

  const speed = SPEEDS[difficulty];
  gameLoop  = setInterval(tick, speed);

  if (gameMode === 'time') {
    document.getElementById('stat-time').style.display = '';
    timerLoop = setInterval(tickTimer, 1000);
  } else {
    document.getElementById('stat-time').style.display = 'none';
  }

  stats.games++;
  saveStats();
  updateFooterStats();

  // First draw
  draw();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

// ── Game Tick ──────────────────────────────────────────────
function tick() {
  if (!running || paused) return;

  dir = { ...nextDir };

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall check (classic wraps; survival = instant death; time = wall death)
  if (gameMode === 'classic') {
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;
  } else {
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(); return;
    }
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  const ate = head.x === food.x && head.y === food.y;
  if (ate) {
    score++;
    stats.food++;
    if (score > stats.best) { stats.best = score; triggerAchievement('NEW BEST!'); }
    if (score === 5)  triggerAchievement('HUNGRY!');
    if (score === 10) triggerAchievement('SERPENT!');
    if (score === 25) triggerAchievement('LEGEND!');
    saveStats();
    sfxEat();
    food = spawnFood();
    updateHUD();
    updateFooterStats();

    // Survival: speed increases
    if (gameMode === 'survival') {
      clearInterval(gameLoop);
      const baseSpeed = SPEEDS[difficulty];
      const newSpeed  = Math.max(30, baseSpeed - score * 3);
      gameLoop = setInterval(tick, newSpeed);
    }
  } else {
    snake.pop();
  }

  draw();
}

function tickTimer() {
  if (!running || paused) return;
  timeLeft--;
  updateStatTime();
  if (timeLeft <= 0) { endGame(); }
  else if (timeLeft <= 10) {
    document.getElementById('stat-time').classList.add('danger');
  }
}

function updateStatTime() {
  document.getElementById('time-display').textContent = timeLeft;
}

function endGame() {
  running = false;
  clearInterval(gameLoop);
  clearInterval(timerLoop);
  sfxDie();

  if (score > stats.best) { stats.best = score; saveStats(); }

  document.getElementById('go-score').textContent = score;
  document.getElementById('gameover-overlay').classList.remove('hidden');
  updateHUD();
  updateFooterStats();
}

// ── Drawing ────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid lines (subtle)
  ctx.strokeStyle = getCSSVar('--border');
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 0.4;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*GRID,0); ctx.lineTo(x*GRID,H); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*GRID); ctx.lineTo(W,y*GRID); ctx.stroke(); }
  ctx.globalAlpha = 1;

  // Food
  const fx = food.x * GRID + GRID/2;
  const fy = food.y * GRID + GRID/2;
  ctx.save();
  ctx.shadowColor = 'rgba(255,68,102,0.8)';
  ctx.shadowBlur  = 12;
  ctx.fillStyle   = '#ff4466';
  ctx.beginPath();
  ctx.arc(fx, fy, GRID/2 - 2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Snake
  snake.forEach((seg, i) => {
    const ratio = i / snake.length;
    const r = lerp(0, 0,   ratio);   // r stays 0
    const g = lerp(255, 100, ratio);
    const b = lerp(136, 60, ratio);
    ctx.fillStyle = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;

    if (i === 0) {
      // Head: glow
      ctx.save();
      ctx.shadowColor = 'rgba(0,255,136,0.6)';
      ctx.shadowBlur  = 10;
    }

    const pad = i === 0 ? 1 : 2;
    roundRect(ctx, seg.x*GRID+pad, seg.y*GRID+pad, GRID-pad*2, GRID-pad*2, i===0 ? 4 : 3);
    ctx.fill();

    if (i === 0) {
      ctx.restore();
      // Eyes
      const ex = seg.x*GRID + GRID/2 + dir.y * 2;
      const ey = seg.y*GRID + GRID/2 + dir.x * 2;  // intentional swap for perpendicular
      // offset based on dir
      const e1x = seg.x*GRID + GRID/2 + dir.x*4 + dir.y*3;
      const e1y = seg.y*GRID + GRID/2 + dir.y*4 + dir.x*3;
      const e2x = seg.x*GRID + GRID/2 + dir.x*4 - dir.y*3;
      const e2y = seg.y*GRID + GRID/2 + dir.y*4 - dir.x*3;
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(e1x, e1y, 1.8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x, e2y, 1.8, 0, Math.PI*2); ctx.fill();
    }
  });
}

function lerp(a, b, t) { return a + (b - a) * t; }

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ── HUD ────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent  = Math.max(score, stats.best);
}

function updateFooterStats() {
  document.getElementById('stat-games').textContent   = stats.games;
  document.getElementById('stat-food').textContent    = stats.food;
  document.getElementById('stat-bestever').textContent = stats.best;
}

// ── Achievement Toast ──────────────────────────────────────
let achieveTimer;
function triggerAchievement(text) {
  const el = document.getElementById('achievement');
  document.getElementById('achievement-text').textContent = text;
  el.classList.add('show');
  clearTimeout(achieveTimer);
  achieveTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Pause / Resume ─────────────────────────────────────────
function togglePause() {
  if (!running) return;
  paused = !paused;
  sfxPause();
  document.getElementById('pause-overlay').classList.toggle('hidden', !paused);
}

// ── Controls ───────────────────────────────────────────────
const KEY_MAP = {
  ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
  w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
  W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0},
};

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') { togglePause(); return; }
  const d = KEY_MAP[e.key];
  if (!d) return;
  e.preventDefault();
  if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
});

// D-Pad
function dpadDir(dx, dy) {
  if (!running || paused) return;
  if (dx !== -dir.x || dy !== -dir.y) nextDir = { x: dx, y: dy };
}
document.getElementById('dp-up').addEventListener('click',    () => dpadDir(0,-1));
document.getElementById('dp-down').addEventListener('click',  () => dpadDir(0, 1));
document.getElementById('dp-left').addEventListener('click',  () => dpadDir(-1,0));
document.getElementById('dp-right').addEventListener('click', () => dpadDir( 1,0));
document.getElementById('dp-pause').addEventListener('click', togglePause);

// Swipe
canvas.addEventListener('touchstart', e => {
  swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (!swipeStart) return;
  const dx = e.changedTouches[0].clientX - swipeStart.x;
  const dy = e.changedTouches[0].clientY - swipeStart.y;
  swipeStart = null;
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15) { togglePause(); return; }
  let nd;
  if (Math.abs(dx) > Math.abs(dy)) nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  e.preventDefault();
}, { passive: false });

// ── Menu Toggles ───────────────────────────────────────────
let selectedMode = 'classic', selectedDiff = 'medium';

document.querySelectorAll('#mode-group .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#mode-group .toggle-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMode = btn.dataset.val;
  });
});

document.querySelectorAll('#diff-group .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#diff-group .toggle-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDiff = btn.dataset.val;
  });
});

// ── Buttons ────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', () => {
  initGame(selectedMode, selectedDiff);
});

document.getElementById('btn-resume').addEventListener('click', togglePause);

document.getElementById('btn-pause-menu').addEventListener('click', () => {
  running = false;
  clearInterval(gameLoop); clearInterval(timerLoop);
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  document.getElementById('stat-time').classList.remove('danger');
});

document.getElementById('btn-replay').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('stat-time').classList.remove('danger');
  initGame(gameMode, difficulty);
});

document.getElementById('btn-go-menu').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  document.getElementById('stat-time').classList.remove('danger');
});

// ── Sound / Theme / Fullscreen ─────────────────────────────
document.getElementById('btn-sound').addEventListener('click', () => {
  soundOn = !soundOn;
  const btn = document.getElementById('btn-sound');
  btn.textContent = soundOn ? '🔊' : '🔇';
  btn.classList.toggle('active', soundOn);
});

document.getElementById('btn-theme').addEventListener('click', () => {
  lightMode = !lightMode;
  document.body.classList.toggle('light', lightMode);
  document.getElementById('btn-theme').textContent = lightMode ? '☀️' : '🌙';
});

document.getElementById('btn-fs').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

// ── Init ───────────────────────────────────────────────────
window.addEventListener('load', () => {
  setupCanvas();
  updateFooterStats();
  updateHUD();
  // Draw idle grid
  if (ctx) {
    ctx.fillStyle = getCSSVar('--surface');
    ctx.fillRect(0,0,W,H);
  }
});

window.addEventListener('resize', () => {
  setupCanvas();
  if (!running) {
    if (ctx) {
      ctx.fillStyle = getCSSVar('--surface');
      ctx.fillRect(0,0,W,H);
    }
  }
});
</script>
